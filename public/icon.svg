<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="wy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#efc603" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <rect x="12" y="12" width="488" height="488" rx="108" fill="none" stroke="url(#wy)" stroke-width="6" stroke-opacity="0.3" />
  <g filter="url(#glow)">
    <!-- Letter W -->
    <path d="M 80,175 L 115,335 L 160,245 L 205,335 L 240,175" fill="none" stroke="url(#wy)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Letter Y -->
    <path d="M 280,175 L 355,255 L 430,175 M 355,255 L 355,335" fill="none" stroke="url(#wy)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
